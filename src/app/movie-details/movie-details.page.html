<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>MovieDetails</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">MovieDetails</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-button fill="clear">ADD TO FAVOURITES</ion-button>
  <ion-list>
    <ion-item *ngFor="let d of movieDetails">{{d}}</ion-item>
  </ion-list>
</ion-content>
