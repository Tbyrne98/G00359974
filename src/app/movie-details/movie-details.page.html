<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>MovieDetails</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">MovieDetails</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-button fill="clear">ADD TO FAVOURITES 
    <ion-icon slot="icon-only" name="heart"></ion-icon>
  </ion-button>
  <ion-card *ngFor="let movie of movieInfo">
    <img src="https://image.tmdb.org/t/p/w500/{{movie.profile_path}}" />
    <ion-card-header>
      <ion-card-title>{{movie.id}}</ion-card-title>
      <ion-card-subtitle>{{movie.character}}</ion-card-subtitle>
    </ion-card-header>
  </ion-card>
</ion-content>
