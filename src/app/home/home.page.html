<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00359974 <ion-button [routerLink]="['/favourites']"></ion-button>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
<ion-input label="Search" placeholder="Movie Name" [(ngModel)]="MovieName"></ion-input>
  <ion-button (click)="openMovies()" expand="block">Search</ion-button>
  <ion-card *ngFor="let movie of movieInfo">
    <img src="https://api.themoviedb.org{{movie.poster_path}}" />
    <ion-card-header>
      <ion-card-title>{{movie.id}}</ion-card-title>
      <ion-card-subtitle>{{movie.overview}}</ion-card-subtitle>
    </ion-card-header>
  </ion-card>
</ion-content>
