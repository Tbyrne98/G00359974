<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00359974 <ion-button [routerLink]="['/favourites']"></ion-button>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
<ion-input label="Search" placeholder="Movie Name" [(ngModel)]="MovieName"></ion-input>
  <ion-button expand="block">Search</ion-button>
    <ion-item (click)="openTrendingMovies(t)" *ngFor="let t of TodaysTrendingMovies">
      <ion-label>{{t.title}}</ion-label>
    </ion-item>
</ion-content>
